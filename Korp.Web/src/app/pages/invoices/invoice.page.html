<div class="create-button">
    <button mat-flat-button color="primary" (click)="openDialog()">
        Criar Nota
    </button>
</div>

<table mat-table [dataSource]="this.invoices ?? []">
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let invoice"> {{ invoice.id }} </td>
    </ng-container>

    <ng-container matColumnDef="status" class="field">
        <th mat-header-cell *matHeaderCellDef class="field"> Status </th>
        <td mat-cell *matCellDef="let invoice" class="field"> {{ showStatus(invoice.status) }} </td>
    </ng-container>

    <ng-container matColumnDef="quantityItems" class="field">
        <th mat-header-cell *matHeaderCellDef class="field"> Itens Qtd. </th>
        <td mat-cell *matCellDef="let invoice" class="field"> {{ invoice.items.length }} </td>
    </ng-container>

    <ng-container matColumnDef="createdAt" class="field">
        <th mat-header-cell *matHeaderCellDef class="field"> Criado em </th>
        <td mat-cell *matCellDef="let invoice" class="field"> 
            {{ invoice.createdAt | date:'dd/MM/yyyy HH:mm' }} 
        </td>
    </ng-container>
    
    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions"></th>
        <td mat-cell *matCellDef="let invoice" class="actions">
            <button mat-icon-button color="primary" (click)="openDialog(invoice)">
                <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button 
                color="primary" 
                (click)="print(invoice)" 
                [disabled]="invoice.status != 'Open'">

                <mat-icon>
                    @if (this.printingInvoices.indexOf(invoice) > 0) {
                        <mat-spinner diameter="25" style="display: inline-block; margin-right: 8px;"></mat-spinner>
                    }
                    @else {
                        print
                    }
                </mat-icon>
            </button>

        </td>
    </ng-container> 

    <thead>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    </thead>
    <tbody>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </tbody>
</table>
